name: Tests

# CI workflow for ε-prolog
# Tests are defined in docs/*.md and executed via Makefile.
# The documentation modules double as the executable test suite.

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - '30.2'
          - '29.4'
          - '28.2'
          - '27.2'
          - 'snapshot'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Emacs
      uses: purcell/setup-emacs@master
      with:
        version: ${{ matrix.emacs-version }}

    - name: Show available test targets
      run: |
        make help

    - name: Check syntax and style
      run: |
        make check

    - name: Run tests
      run: |
        make test
